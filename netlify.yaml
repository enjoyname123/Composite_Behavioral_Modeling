version: 1

build:
  command: |
    cd Composite_Behavioral_Modeling/Composite_Behavioral_Modeling/composite_behavioral_modeling
    pip install -r ../../requirements.txt
    python manage.py migrate
    python manage.py collectstatic --noinput
  functions: netlify/functions
  publish: /

functions:
  - path: django-handler
    handler: netlify/functions/handler.handler

environment:
  - name: PYTHON_VERSION
    value: "3.11"
  - name: DEBUG
    value: "false"

redirects:
  - from: /*
    to: /.netlify/functions/django-handler
    status: 200

headers:
  - path: /static/*
    headers:
      - key: Cache-Control
        value: public, max-age=31536000

