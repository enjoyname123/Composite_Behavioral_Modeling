services:
  - type: web
    name: composite-behavioral-modeling
    env: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      python Composite_Behavioral_Modeling/Composite_Behavioral_Modeling/composite_behavioral_modeling/manage.py migrate
      python Composite_Behavioral_Modeling/Composite_Behavioral_Modeling/composite_behavioral_modeling/manage.py collectstatic --noinput
    startCommand: |
      cd Composite_Behavioral_Modeling/Composite_Behavioral_Modeling/composite_behavioral_modeling
      gunicorn composite_behavioral_modeling.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: composite-modeling-db
          property: connectionString
    
  - type: pserv
    name: composite-modeling-db
    env: sqlite
    plan: free
