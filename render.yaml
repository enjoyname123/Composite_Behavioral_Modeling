services:
  - type: web
    name: composite-behavioral-modeling
    runtime: python311
    buildCommand: |
      pip install -r requirements.txt
      cd composite_behavioral_modeling
      python manage.py collectstatic --noinput
    startCommand: cd composite_behavioral_modeling && gunicorn composite_behavioral_modeling.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: yourdomain.onrender.com
